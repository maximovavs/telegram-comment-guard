name: Moderate Telegram comments every 15 minutes

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  moderate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      OWNER_USER_IDS: ${{ secrets.OWNER_USER_IDS }}
      CHAT_CONFIG_JSON: ${{ secrets.CHAT_CONFIG_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write config from secret
        shell: bash
        run: |
          mkdir -p config
          printf '%s' "$CHAT_CONFIG_JSON" > config/runtime_chats.json

      - name: Run moderation
        env:
          CONFIG_PATH: config/runtime_chats.json
          RUN_MODE: oneshot
        run: python -m app.main
