name: Moderate Telegram comments every 15 minutes

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  moderate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      OWNER_USER_IDS: ${{ secrets.OWNER_USER_IDS }}
      RUN_MODE: oneshot
      CONFIG_PATH: config/runtime_chats.json
      LOG_LEVEL: INFO

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write runtime config from secret
        shell: bash
        run: |
          mkdir -p config
          cat > config/runtime_chats.json <<'JSON'
          ${{ secrets.CHAT_CONFIG_JSON }}
          JSON

      - name: Run moderation once
        run: python -m app.main
